version: '3.9'

services:

  redis:
    image: redis:7
    container_name: financial_redis
    ports:
      - "6379:6379"

  api:
    build: ./api
    container_name: financial_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  superset:
    image: apache/superset:latest
    container_name: financial_superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=supersecretkey
    depends_on:
      - redis


